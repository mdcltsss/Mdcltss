<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDCLTS - Detalle Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-fondo-imagen: url('https://i.ibb.co/zVXX6fvF/file-00000000f9c471f5a15978499809ab55.png');
            --fuente-logo: 'Dancing Script', cursive;
            --fuente-cuerpo: 'Inter', sans-serif;
            --fondo-paneles: rgba(0, 0, 0, 0.96);
            --fondo-tarjetas: rgba(255, 255, 255, 0.92);
            --color-primario: #e91e63;
        }

        body {
            margin: 0; padding: 0;
            background-image: var(--color-fondo-imagen);
            background-size: cover; background-attachment: fixed; background-position: center;
            color: #fff; font-family: var(--fuente-cuerpo);
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 5%; position: sticky; top: 0;
            background: rgba(0,0,0,0.9); z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .logo { font-family: var(--fuente-logo); font-size: 2.3rem; margin: 0; cursor: pointer; color: #fff; }

        .iconos-header { display: flex; gap: 15px; align-items: center; }

        .gift-icon, .cart-icon { font-size: 24px; cursor: pointer; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 50%; position: relative; }
        
        .cart-count {
            position: absolute; top: -5px; right: -5px; background: var(--color-primario);
            color: white; font-size: 11px; padding: 3px 7px; border-radius: 50%; font-weight: bold;
        }

        /* Buscador */
        .search-container { padding: 25px 5% 5px 5%; text-align: center; }
        #buscador {
            width: 100%; max-width: 450px; padding: 14px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.7);
            color: #fff; outline: none; font-size: 1rem;
        }

        /* Catálogo */
        .contenedor-productos {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; padding: 30px 5%;
        }

        .producto {
            background: var(--fondo-tarjetas); padding: 15px; text-align: center; border-radius: 15px; color: #000;
            transition: 0.3s;
        }

        /* Imagen con efecto de lupa al pasar el mouse */
        .producto img { 
            width: 100%; border-radius: 10px; cursor: zoom-in; 
            transition: 0.3s; object-fit: cover; aspect-ratio: 1/1;
        }
        .producto img:hover { opacity: 0.85; }

        .marca { font-weight: bold; font-size: 0.7rem; text-transform: uppercase; color: #777; margin-top: 10px; display: block; }
        .desc-prod { font-size: 1rem; margin: 5px 0; font-weight: 600; }
        .precio { font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; display: block; }

        /* Botones */
        .botones-accion { display: flex; flex-direction: column; gap: 8px; }
        .btn-directo { background: #25d366; color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.8rem; }
        .btn-carrito { background: #000; color: #fff; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.8rem; }

        /* MODAL DE IMAGEN GRANDE (Lightbox) */
        #modalImagen {
            display: none; position: fixed; z-index: 3000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        #imgExpandida { max-width: 90%; max-height: 85%; border-radius: 10px; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .cerrar-modal { position: absolute; top: 20px; right: 30px; font-size: 50px; color: #fff; cursor: pointer; font-weight: bold; }

        /* Otros Modales y Paneles */
        .modal, .panel { 
            display: none; position: fixed; z-index: 2000; height: 100%; background: var(--fondo-paneles); 
            transition: 0.4s; top: 0; right: 0; width: 0; overflow-x: hidden; 
        }
        .modal-regalo { 
            display: none; position: fixed; z-index: 2500; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center; 
        }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; text-align: center; max-width: 300px; color: #000; }

        @media (max-width: 600px) {
            .contenedor-productos { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
            .logo { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="gift-icon" onclick="toggleModal('modalRegalo', true)">🎁</div>
        <h1 class="logo" onclick="location.reload()">MDCLTS</h1>
        <div class="iconos-header">
            <div class="cart-icon" onclick="abrirPanel('panelCarrito')">
                🛒 <span class="cart-count" id="contador">0</span>
            </div>
            <div style="font-size: 30px; cursor: pointer;" onclick="abrirPanel('panelMenu')">&#9776;</div>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="buscador" placeholder="Busca marca o estilo..." onkeyup="buscar()">
    </div>

    <div id="modalImagen" onclick="cerrarImagen()">
        <span class="cerrar-modal">&times;</span>
        <img id="imgExpandida">
    </div>

    <div id="modalRegalo" class="modal-regalo" style="display:none;">
        <div class="modal-content">
            <h3 style="margin-top:0;">¡Tu Regalo! 🎁</h3>
            <p>Email para recibir un 10% de descuento:</p>
            <input type="email" id="emailRegalo" placeholder="Tu correo" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ddd;">
            <button class="btn-carrito" style="width:100%;" onclick="generarCodigo()">Obtener Código</button>
            <div id="resCod" style="margin-top:15px; font-weight:bold; color:var(--color-primario); display:none;"></div>
            <p onclick="toggleModal('modalRegalo', false)" style="cursor:pointer; text-decoration:underline; font-size:0.8rem; margin-top:15px;">Cerrar</p>
        </div>
    </div>

    <div id="panelMenu" class="panel" style="display:block;">
        <span onclick="cerrarPanel('panelMenu')" style="position:absolute; top:20px; left:25px; font-size:35px; cursor:pointer;">&times;</span>
        <h2 style="padding:80px 30px 20px 30px; border-bottom:1px solid #333;">Marcas</h2>
        <a href="#" onclick="filtrar('todos')" style="padding:15px 30px; color:#fff; display:block; text-decoration:none;">TODAS</a>
        <a href="#" onclick="filtrar('clemont')" style="padding:15px 30px; color:#fff; display:block; text-decoration:none;">CLEMONT</a>
        <a href="#" onclick="filtrar('lacoste')" style="padding:15px 30px; color:#fff; display:block; text-decoration:none;">LACOSTE</a>
        <a href="#" onclick="filtrar('essentials')" style="padding:15px 30px; color:#fff; display:block; text-decoration:none;">ESSENTIALS</a>
        <a href="#" onclick="filtrar('hugo')" style="padding:15px 30px; color:#fff; display:block; text-decoration:none;">HUGO BOSS</a>
        <a href="#" onclick="filtrar('prada')" style="padding:15px 30px; color:#fff; display:block; text-decoration:none;">PRADA</a>
    </div>

    <div id="panelCarrito" class="panel" style="display:block;">
        <span onclick="cerrarPanel('panelCarrito')" style="position:absolute; top:20px; left:25px; font-size:35px; cursor:pointer;">&times;</span>
        <h2 style="padding:80px 30px 20px 30px; border-bottom:1px solid #333;">Carrito</h2>
        <div id="items-carrito"></div>
        <div style="padding:25px; font-weight:bold; font-size:1.3rem;">Total: $<span id="total-precio">0</span></div>
        <button class="btn-carrito" style="margin:0 25px; width:calc(100% - 50px); background:var(--color-primario);" onclick="enviarPedido()">Finalizar Pedido</button>
    </div>

    <div class="contenedor-productos" id="lista-productos"></div>

    <script>
        const nroWhatsApp = "573018942801";
        const precioUnitario = 89990;
        let carrito = [];

        const productos = [
            { id: 1, img: 'https://i.ibb.co/BHRtpKhL/IMG-3083.jpg', marca: 'clemont', desc: 'Clemont Negra' },
            { id: 2, img: 'https://i.ibb.co/wrLfQP7g/IMG-3084.jpg', marca: 'clemont', desc: 'Clemont Blanca' },
            { id: 3, img: 'https://i.ibb.co/YB878d2J/IMG-3086.jpg', marca: 'clemont', desc: 'Clemont Piel' },
            { id: 4, img: 'https://i.ibb.co/sSSpTTF/IMG-3123.jpg', marca: 'lacoste', desc: 'Lacoste Rojo' },
            { id: 5, img: 'https://i.ibb.co/qYNVdh7Y/IMG-9468.jpg', marca: 'lacoste', desc: 'Lacoste Gris' },
            { id: 6, img: 'https://i.ibb.co/6RnLj3gd/IMG-9474.jpg', marca: 'lacoste', desc: 'Lacoste Café' },
            { id: 7, img: 'https://i.ibb.co/1YTRvRLT/IMG-0266.jpg', marca: 'essentials', desc: 'Essentials Verde' },
            { id: 8, img: 'https://i.ibb.co/SXV3ZyDm/IMG-0268.jpg', marca: 'essentials', desc: 'Essentials Café' },
            { id: 9, img: 'https://i.ibb.co/C3vRm675/IMG-0261-1.jpg', marca: 'monastery', desc: 'Monastery Café' },
            { id: 10, img: 'https://i.ibb.co/rRLW0Pjm/IMG-0263.jpg', marca: 'monastery', desc: 'Monastery Negra' },
            { id: 11, img: 'https://i.ibb.co/LXMq549x/a6a4d12f-d481-49b9-b248-f6041802f6a3-1.jpg', marca: 'hugo', desc: 'Hugo Boss Gris' },
            { id: 12, img: 'https://i.ibb.co/q39xtcCh/6466974d-a5e7-47b7-a5ec-6b8f7787be4e.jpg', marca: 'hugo', desc: 'Hugo Boss Blanco' },
            { id: 13, img: 'https://i.ibb.co/Y7VbLH00/781c854a-5a9e-4167-929b-3074e2835a61.jpg', marca: 'prada', desc: 'Prada Blanco' },
            { id: 14, img: 'https://i.ibb.co/ymFKxGYj/43409ec0-cdab-48fa-8b38-f685866ca30f-1.jpg', marca: 'prada', desc: 'Prada Negro' },
            { id: 15, img: 'https://i.ibb.co/rKgyc4dQ/ed65d0ae-8840-48ae-978b-82bde2b40e82-1.jpg', marca: 'balmain', desc: 'Balmain Negra' },
            { id: 16, img: 'https://i.ibb.co/99wHLchB/88ba4f1b-0b96-4dd7-b7f3-70125cd74c0b-1.jpg', marca: 'nike', desc: 'Nike Azul' }
        ];

        // FUNCIONES DE IMAGEN GRANDE
        function verImagen(url) {
            document.getElementById('imgExpandida').src = url;
            document.getElementById('modalImagen').style.display = 'flex';
        }
        function cerrarImagen() { document.getElementById('modalImagen').style.display = 'none'; }

        function abrirPanel(id) { document.getElementById(id).style.width = window.innerWidth > 600 ? "350px" : "100%"; }
        function cerrarPanel(id) { document.getElementById(id).style.width = "0"; }
        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

        function buscar() {
            const t = document.getElementById('buscador').value.toLowerCase();
            mostrarProductos(productos.filter(p => p.marca.includes(t) || p.desc.toLowerCase().includes(t)));
        }

        function generarCodigo() {
            const email = document.getElementById('emailRegalo').value;
            if(!email.includes('@')) return alert("Email inválido");
            const cod = "MDCLTS-" + Math.floor(1000 + Math.random()*9000);
            document.getElementById('resCod').innerText = "CÓDIGO: " + cod;
            document.getElementById('resCod').style.display = 'block';
        }

        function mostrarProductos(lista) {
            const c = document.getElementById('lista-productos');
            c.innerHTML = '';
            lista.forEach(p => {
                const wa = `https://wa.me/${nroWhatsApp}?text=Hola, quiero la Camiseta ${encodeURIComponent(p.desc)}`;
                c.innerHTML += `
                    <div class="producto">
                        <img src="${p.img}" onclick="verImagen('${p.img}')" title="Clic para ampliar">
                        <span class="marca">${p.marca}</span>
                        <div class="desc-prod">${p.desc}</div>
                        <span class="precio">$89.990</span>
                        <div class="botones-accion">
                            <a href="${wa}" target="_blank" class="btn-directo">WhatsApp Directo</a>
                            <button class="btn-carrito" onclick="agregarAlCarrito(${p.id})">Añadir al Carrito</button>
                        </div>
                    </div>
                `;
            });
        }

        function agregarAlCarrito(id) {
            carrito.push(productos.find(p => p.id === id));
            actualizarCarrito();
            abrirPanel('panelCarrito');
        }

        function actualizarCarrito() {
            document.getElementById('contador').innerText = carrito.length;
            const items = document.getElementById('items-carrito');
            items.innerHTML = '';
            let total = 0;
            carrito.forEach((item, i) => {
                total += precioUnitario;
                items.innerHTML += `
                    <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #222; gap:10px; color:#fff;">
                        <img src="${item.img}" style="width:50px; border-radius:5px;">
                        <div style="flex:1; font-size:0.8rem;">${item.desc}<br>$89.990</div>
                        <small onclick="eliminar(${i})" style="color:red; cursor:pointer">X</small>
                    </div>`;
            });
            document.getElementById('total-precio').innerText = total.toLocaleString('es-CO');
        }

        function eliminar(idx) { carrito.splice(idx,1); actualizarCarrito(); }

        function enviarPedido() {
            if(carrito.length === 0) return alert("Carrito vacío");
            let m = "Hola MDCLTS, mi pedido:\n";
            carrito.forEach(i => m += `- ${i.desc}\n`);
            m += `Total: $${(carrito.length * precioUnitario).toLocaleString('es-CO')}`;
            window.open(`https://wa.me/${nroWhatsApp}?text=${encodeURIComponent(m)}`);
        }

        function filtrar(m) { cerrarPanel('panelMenu'); mostrarProductos(m==='todos'?productos:productos.filter(p=>p.marca===m)); }

        mostrarProductos(productos);
    </script>
</body>
</html>
